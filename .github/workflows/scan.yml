name: Cloudflare Scan

on:
  workflow_dispatch:
    inputs:
      iata_code:
        description: 'IATA码（可选），例如：LAX'
        required: false
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests
          
      - name: Run scan
        env:
          # 先尝试使用手动输入的值，没有则使用仓库变量
          MANUAL_IATA: ${{ inputs.iata_code }}
          REPO_IATA: ${{ vars.IATA_CODE }}
        run: |
          # 确定使用哪个 IATA 码
          if [ -n "$MANUAL_IATA" ]; then
            IATA_CODE="$MANUAL_IATA"
          elif [ -n "$REPO_IATA" ]; then
            IATA_CODE="$REPO_IATA"
          else
            IATA_CODE=""
          fi
          
          echo "Manual input: '$MANUAL_IATA'"
          echo "Repository variable: '$REPO_IATA'"
          echo "Using IATA_CODE: '$IATA_CODE'"
          
          # 设置环境变量并运行脚本
          export IATA_CODE
          python scan_cli.py
          
      - name: Commit and push results
        run: |
          ls -la
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 确保添加所有 CSV 文件
          git add "*.csv" 2>/dev/null || true
          
          git status
          
          # 检查是否有文件被添加
          git diff --cached --name-only
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update scan results: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${GITHUB_REF}
          fi
