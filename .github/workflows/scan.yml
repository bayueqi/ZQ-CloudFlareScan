name: CloudFlare Scan

on:
  schedule:
    # 每天运行一次，时间为 UTC 00:00（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 aiohttp requests
    
    - name: Run scan
      run: |
        python scan_cli.py
    
    - name: Check results
      run: |
        ls -la results/
    
    - name: Commit and push results
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add results/
        git diff --cached --quiet || git commit -m "Update scan results $(date +'%Y-%m-%d')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
